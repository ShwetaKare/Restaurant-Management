<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .payment-container {
            background-color: white;
            width: 700px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }
        h3 {
            font-size: 1.5em;
            margin-bottom: 20px;
        }
        .payment-methods {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .method-list {
            width: 150px;
            border-right: 1px solid #ddd;
        }
        .method-list ul {
            list-style-type: none;
            padding: 0;
        }
        .method-list li {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }
        .method-list li:hover, .method-list li.active {
            background-color: #f0f0f0;
        }
        .payment-details {
            width: 500px;
            padding-left: 20px;
        }
        .inputBox {
            margin-bottom: 15px;
        }
        .inputBox label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .inputBox input, 
        .inputBox select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .inputBox img {
            max-width: 50px;
        }
        .submit_btn {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }
        .submit_btn:hover {
            background-color: #0056b3;
        }
        .secure-notice {
            font-size: 0.9em;
            color: #666;
            margin-top: 15px;
            text-align: center;
        }
        .secure-icons {
            text-align: center;
            margin-top: 10px;
        }
        .secure-icons img {
            max-height: 40px;
            margin-right: 10px;
        }
        .secure-icons img:last-child {
            margin-right: 0;
        }
        .card-detected {
            font-size: 0.9em;
            color: green;
            margin-top: 10px;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>

    <div class="payment-container">
        <h3>Choose a payment method</h3>
        <div class="payment-methods">
            <div class="method-list">
                <ul>
                    <li class="active">Credit Card</li>
                    <li>Debit Card</li>
                    <li>Net Banking</li>
                    <li>Wallets</li>
                </ul>
            </div>
            <div class="payment-details">
                <div class="inputBox">
                    <label for="cardType">Card Type:</label>
                    <img id="visaLogo" src="https://upload.wikimedia.org/wikipedia/commons/4/41/Visa_Logo.png" alt="Visa" >
                    <img id="mastercardLogo" src="https://upload.wikimedia.org/wikipedia/commons/b/b7/MasterCard_Logo.svg" alt="MasterCard" >
                    <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/American_Express_logo_%282018%29.svg" alt="American Express">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS2o8Kh1_jMj0bSiVVTgRXk-R3aL7-QsDHgpw&s" alt="Diners Club">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/1/1b/UnionPay_logo.svg" alt="Union Pay">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS5EpWyRjl7xi4MVh1t-4jP2nQdSIrTMNc6nw&s" alt="JCB">
                    <img src="https://w7.pngwing.com/pngs/545/892/png-transparent-maestro-mastercard-debit-card-logo-cirrus-logo-corel-text-trademark-payment.png" alt="Maestro">
                    <img src="https://i0.wp.com/akitra.com/wp-content/uploads/2023/03/PCI-DSS-large.png?fit=800%2C800&ssl=1g" alt="PCI DSS">
                    <img src="https://1000logos.net/wp-content/uploads/2021/12/Norton-Logo.png" alt="Norton Secured">
                    
                </div>
                <form id="paymentForm" action="http://localhost:3000/pay" method="POST">
                    <div class="inputBox">
                        <label for="cardName">Enter email</label>
                        <input type="email" id="email" name="email" placeholder="abc@gmail.com" required>
                    </div>
                <div class="inputBox">
                    <label for="cardNum">Card Number:</label>
                    <input type="text" id="cardNum" placeholder="Enter card number" maxlength="19" required oninput="detectCardType()" >
                    <p id="cardTypeDetected" class="card-detected"></p>
                </div>
                <div class="inputBox">
                    <label for="cardName">Name on Card:</label>
                    <input type="text" id="cardName" placeholder="Enter name on card" required>
                </div>
                <div class="inputBox">
                    <label for="cvv">CVV Number:</label>
                    <input type="number" id="cvv" placeholder="Enter CVV" required>
                </div>
                <div class="inputBox">
                    <label for="expDate">Expiry Date:</label>
                    <select id="expMonth" required>
                        <option value="">Month</option>
                        <option value="01">January</option>
                        <option value="02">February</option>
                        <option value="03">March</option>
                        <option value="04">April</option>
                        <option value="05">May</option>
                        <option value="06">June</option>
                        <option value="07">July</option>
                        <option value="08">August</option>
                        <option value="09">September</option>
                        <option value="10">October</option>
                        <option value="11">November</option>
                        <option value="12">December</option>
                    </select>
                    <select id="expYear" required>
                        <option value="">Year</option>
                        <option value="2023">2023</option>
                        <option value="2024">2024</option>
                        <option value="2025">2025</option>
                        <option value="2026">2026</option>
                        <option value="2027">2027</option>
                        <option value="2028">2028</option>
                        <option value="2029">2029</option>
                        <option value="2030">2030</option>
                    </select>
                </div>

                <button type="submit" class="submit_btn">Pay Now</button>
            </div>
        </div>
    </form>

        <div class="secure-notice">
            <p>Note: In the next step, you will be redirected to your bank's website to verify your payment.</p>
            <p>Making payment is 100% safe. Your transaction is processed through a secure HTTPS connection.</p>
        </div>
        <div class="secure-icons">
            <img id="visaLogo" src="https://upload.wikimedia.org/wikipedia/commons/4/41/Visa_Logo.png" alt="Visa" >
                    <img id="mastercardLogo" src="https://upload.wikimedia.org/wikipedia/commons/b/b7/MasterCard_Logo.svg" alt="MasterCard" >
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/American_Express_logo_%282018%29.svg" alt="American Express">

            <img src="https://i0.wp.com/akitra.com/wp-content/uploads/2023/03/PCI-DSS-large.png?fit=800%2C800&ssl=1g" alt="PCI DSS">
            <img src="https://1000logos.net/wp-content/uploads/2021/12/Norton-Logo.png" alt="Norton Secured">
        </div>
    </div>

    <script>
function detectCardType() {
    const cardNum = document.getElementById('cardNum').value;
    const cardTypeDetected = document.getElementById('cardTypeDetected');
    
    // Extract first four digits
    const firstFourDigits = cardNum.slice(0, 4);

    // Reset the detection message
    cardTypeDetected.textContent = '';
    cardTypeDetected.style.color = 'green'; // Default color for success

    // Detect card type based on the first four digits
    switch (firstFourDigits) {
        case '4111':
        case '4000':
            cardTypeDetected.textContent = 'Visa card detected';
            break;
        case '5100':
        case '5200':
            cardTypeDetected.textContent = 'MasterCard detected';
            break;
        case '3400':
        case '3700':
            cardTypeDetected.textContent = 'American Express detected';
            break;
        case '6011':
        case '6500':
            cardTypeDetected.textContent = 'Discover card detected';
            break;
        case '3528':
        case '3589':
            cardTypeDetected.textContent = 'JCB card detected';
            break;
        case '3000':
        case '3600':
            cardTypeDetected.textContent = 'Diners Club detected';
            break;
        case '6200':
            cardTypeDetected.textContent = 'UnionPay card detected';
            break;
        case '5018':
        case '5038':
            cardTypeDetected.textContent = 'Maestro card detected';
            break;
        default:
            if (cardNum.length >= 4) {
                cardTypeDetected.textContent = 'Unknown card type';
                cardTypeDetected.style.color = 'red'; // Error color for unknown type
            }
    }
}



    </script>
</body>
</html>
